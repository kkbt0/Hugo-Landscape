{{ define "main" }}
<div class="flex w-full rounded-[var(--radius-large)] overflow-hidden relative min-h-32">
  <div class="card-base z-10 px-9 py-6 relative w-full ">
    <div id="friends-list" style="display:grid;grid-template-columns:repeat(2,1fr);gap:2rem 1.5rem;margin:1rem 0;">
      {{ range .Site.Data.friends }}
      <div class="friend-card" style="display:flex;flex-wrap:nowrap;align-items:stretch;height:7rem;gap:1rem;border-radius:var(--radius-large);">
        <div style="width:7rem;height:7rem;flex-shrink:0;border-radius:0.5rem;overflow:hidden;background:oklch(0.92 0.01 var(--hue));">
          <img src="{{ .imgurl }}" alt="站点头像" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div style="flex-grow:1;width:100%;">
          <div style="font-weight:700;transition:color 0.2s;font-size:1.125rem;color:var(--deep-text);margin-bottom:0.25rem;">{{ .title }}</div>
          <div style="color:oklch(0.5 0.02 var(--hue));font-size:0.875rem;font-weight:500;">{{ .desc }}</div>
        </div>
        <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" style="display:flex;width:3.25rem;border-radius:0.5rem;background:var(--enter-btn-bg);flex-shrink:0;transition:all 0.2s;" onmouseover="this.style.background='var(--enter-btn-bg-hover)'" onmouseout="this.style.background='var(--enter-btn-bg-hover)'" onmousedown="this.style.background='var(--enter-btn-bg-active)'" onmouseup="this.style.background='var(--enter-btn-bg-hover)'">
          <svg width="1em" height="1em" viewBox="0 0 24 24" style="transition:color 0.2s;color:var(--primary);font-size:2.25rem;margin:auto;" data-icon="material-symbols:chevron-right-rounded">
            <use href='{{"icons/main.svg#material-symbols:chevron-right-rounded"|relURL}}'></use>
          </svg>
        </a>
      </div>
      {{ end }}
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('friends-list');
    if (!container) return;
    var cards = Array.from(container.children);
    for (var i = cards.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = cards[i]; cards[i] = cards[j]; cards[j] = temp;
    }
    cards.forEach(function(card) { container.appendChild(card); });
});

// 响应式：小于 640px 时改为单列
(function() {
    var mq = window.matchMedia('(min-width: 640px)');
    function update(e) {
        var el = document.getElementById('friends-list');
        if (!el) return;
        el.style.gridTemplateColumns = e.matches ? 'repeat(2, 1fr)' : 'repeat(1, 1fr)';
    }
    mq.addEventListener('change', update);
    update(mq);
})();
</script>
{{ end }}
