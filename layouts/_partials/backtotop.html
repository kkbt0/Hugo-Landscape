<!-- There can't be a filter on parent element, or it will break `fixed` -->
<div x-data="axd.backToTop()" class="back-to-top-wrapper hidden lg:block" @scroll.window="onScroll()">
    <div id="back-to-top-btn" class="back-to-top-btn hide flex items-center rounded-2xl overflow-hidden transition"
        @click="window.scroll({ top: 0, behavior: 'smooth' })" :class="{'hide': hide}">
        <button aria-label="Back to Top" class="btn-card h-[3.75rem] w-[3.75rem]">
            <svg width="1em" height="1em" class="mx-auto" data-icon="material-symbols:keyboard-arrow-up-rounded">
                <use href='{{"icons/main.svg#material-symbols:keyboard-arrow-up-rounded"|relURL}}'></use>
            </svg>
        </button>
    </div>
</div>
<style>
    .back-to-top-wrapper {
        width: 3.75rem;
        height: 3.75rem;
        position: absolute;
        right: 0;
        top: 0;
        pointer-events: none;
    }

    .back-to-top-btn {
        color: var(--primary);
        font-size: 2.25rem;
        font-weight: bold;
        border: none;
        position: fixed;
        bottom: 10rem;
        opacity: 1;
        cursor: pointer;
        transform: translateX(5rem);
        pointer-events: auto;
    }

    .back-to-top-btn i {
        font-size: 1.75rem;
    }

    .back-to-top-btn.hide {
        transform: translateX(5rem) scale(0.9);
        opacity: 0;
        pointer-events: none;
    }

    .back-to-top-btn:active {
        transform: translateX(5rem) scale(0.9);
    }
</style>
