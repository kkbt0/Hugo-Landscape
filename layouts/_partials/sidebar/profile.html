<div class="card-base p-3">
    <a aria-label="Go to About Page" href='{{ "about/" | relURL }}' class="group block relative mx-auto mt-1 lg:mx-0 lg:mt-0 mb-3
       max-w-[12rem] lg:max-w-none overflow-hidden rounded-xl active:scale-95">
        <div class="absolute transition pointer-events-none group-hover:bg-black/30 group-active:bg-black/50
        w-full h-full z-50 flex items-center justify-center">
            <svg width="1.13em" height="1em"
                class="transition opacity-0 scale-90 group-hover:scale-100 group-hover:opacity-100 text-white text-5xl"
                data-icon="fa6-regular:address-card">
                <use href='{{"icons/main.svg#fa6-regular:address-card"|relURL}}'></use>
            </svg>
        </div>
        <div class="mx-auto lg:w-full h-full lg:mt-0  overflow-hidden relative">
            <div class="transition absolute inset-0 dark:bg-black/10 bg-opacity-50 pointer-events-none"></div> <img
                src='{{ "images/default_avatar.webp" | relURL }}' alt="Profile Image of the Author"
                style="object-position: center" width="512" height="512" loading="lazy" decoding="async"
                class="w-full h-full object-cover">
        </div>
    </a>
    <div class="px-2">
        <div class="font-bold text-xl text-center mb-1 dark:text-neutral-50 transition">{{ .Site.Title }}</div>
        <div class="h-1 w-5 bg-[var(--primary)] mx-auto rounded-full mb-2 transition"></div>
        <div class="text-center text-neutral-400 mb-2.5 transition">Bio</div>
        <div class="flex flex-wrap gap-2 justify-center mb-1">
            <a aria-label="Home" href='{{ "about/" | relURL }}' target="_blank"
                class="btn-regular rounded-lg h-10 w-10 active:scale-90">
                <svg width="0.97em" height="1em" class="text-[1.5rem]" data-icon="fa6-brands:github">
                    <use href='{{"icons/main.svg#fa6-brands:github"|relURL}}'></use>
                </svg>
            </a>
        </div>
    </div>
</div>
